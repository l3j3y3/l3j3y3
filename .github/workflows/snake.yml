 name: Generate Snake Animation

  on:
    schedule:
      - cron: "0 */12 * * *"
    workflow_dispatch:
    push:
      branches:
        - main

  jobs:
    generate:
      runs-on: ubuntu-latest
      timeout-minutes: 10

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Generate Snake
          uses: Platane/snk@v3
          with:
            github_user_name: l3j3y3
            outputs: |
              dist/snake.svg

        - name: Push to output branch
          uses: crazy-max/ghaction-github-pages@v3
          with:
            target_branch: output
            build_dir: dist
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
