 name: Generate Snake

  on:
    workflow_dispatch:
    schedule:
      - cron: "0 0 * * *"

  jobs:
    generate:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: Platane/snk@v3
          with:
            github_user_name: l3j3y3
            outputs: dist/snake.svg
        - uses: crazy-max/ghaction-github-pages@v3
          with:
            target_branch: output
            build_dir: dist
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
